<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Green Road — RichAds Playable Fixed</title>
    <!-- Adsgram SDK -->
    <script src="https://sad.adsgram.ai/js/sad.min.js"></script>
    <!-- Monetag SDK -->
    <script src="//libtl.com/sdk.js" data-zone="10541383" data-sdk="show_10541383"></script>
    <!-- RichAds SDK -->
    <script src="https://richinfo.co/richpartners/telegram/js/tg-ob.js"></script>
    <style> /* same as before - omitted for brevity, but include full styles */ 
        * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; font-family: system-ui; }
        body { background: #1a472a; display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 16px; }
        .game-container { max-width: 480px; width: 100%; background: #2e7d32; border-radius: 36px; border: 2px solid #f5b81b; overflow: hidden; }
        .road-header { background: repeating-linear-gradient(90deg, #2a2a2a 0px, #2a2a2a 40px, #f5b81b 40px, #f5b81b 45px, #2a2a2a 45px, #2a2a2a 85px); padding: 18px; text-align: center; }
        .title { font-size: 26px; font-weight: 800; color: white; text-shadow: 2px 2px 0 #1b5e20; background: rgba(0,0,0,0.5); display: inline-block; padding: 6px 20px; border-radius: 40px; }
        .subtitle { color: #f5d742; font-size: 11px; margin-top: 8px; }
        .road-levels { max-height: 460px; overflow-y: auto; padding: 14px; background: rgba(0,0,0,0.25); }
        .level-card { background: linear-gradient(95deg, #2c2c2c, #3a3a3a); margin-bottom: 12px; border-radius: 20px; padding: 14px 18px; display: flex; align-items: center; justify-content: space-between; border-left: 6px solid #f5b81b; cursor: pointer; }
        .level-card.locked { opacity: 0.5; border-left-color: #6c6c6c; pointer-events: none; }
        .level-number { font-size: 26px; font-weight: 800; color: #f5b81b; background: rgba(0,0,0,0.5); width: 52px; height: 52px; display: flex; align-items: center; justify-content: center; border-radius: 16px; }
        .level-info { flex: 1; padding-left: 14px; }
        .level-name { color: white; font-weight: 700; }
        .level-requirement { font-size: 10px; color: #f5d742; }
        .game-panel { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(10,25,15,0.97); backdrop-filter: blur(16px); z-index: 10000; display: flex; align-items: center; justify-content: center; }
        .game-card { background: linear-gradient(145deg, #1e3a2f, #0f2b1f); border-radius: 48px; padding: 28px 18px; max-width: 380px; width: 90%; text-align: center; border: 2px solid #f5b81b; }
        .buttons-grid { display: grid; grid-template-columns: repeat(2,1fr); gap: 14px; margin: 20px 0; }
        .action-btn { background: linear-gradient(135deg, #f5c542, #e5a812); border: none; padding: 16px 0; border-radius: 60px; font-weight: 700; cursor: pointer; }
        .disabled-btn { opacity: 0.55; pointer-events: none; }
        .game-close-btn { background: #3a3a3a; color: #f5c542; padding: 12px 20px; border: none; border-radius: 40px; margin-top: 16px; }
        .countdown-overlay, .levelcomplete-screen, .reward-screen, .ad-sequence-panel { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 11000; display: flex; align-items: center; justify-content: center; background: rgba(0,0,0,0.94); backdrop-filter: blur(12px); }
        .ad-sequence-card { background: #1e2a1f; border-radius: 56px; padding: 32px 24px; max-width: 340px; border: 2px solid #f5c542; text-align: center; color: white; }
        .next-step-btn { background: #f5c542; border: none; padding: 14px 32px; border-radius: 60px; font-weight: bold; margin-top: 16px; cursor: pointer; }
        .offline-toast { position: fixed; bottom: 30px; left: 20px; right: 20px; background: #b91c1c; color: white; text-align: center; padding: 12px; border-radius: 60px; z-index: 20000; }
    </style>
</head>
<body>
<div class="game-container">
    <div class="road-header"><div class="title">GREEN ROAD</div><div class="subtitle">3 Ads (Playable #393872)</div></div>
    <div class="road-levels" id="levelListContainer"></div>
    <div class="footer-note">Each level: tap 5 road tasks</div>
</div>
<div id="gamePanel" class="game-panel" style="display:none;"><div class="game-card"><div id="gameLevelTitle" class="game-level-title">ROUTE 1</div><div class="instruction-box">Click all 5 buttons</div><div id="gameProgressText">0/5</div><div class="buttons-grid" id="buttonsGrid"></div><button class="game-close-btn" id="exitGameBtn">Back to Road</button></div></div>
<div id="countdownOverlay" class="countdown-overlay" style="display:none;"><div class="countdown-number" id="countdownNum">3</div><div class="countdown-message">Next Level in...</div></div>
<div id="levelCompleteScreen" class="levelcomplete-screen" style="display:none;"><div class="complete-title">Level Clear!</div><button class="btn" id="nextLevelBtnFromComplete">Next Level</button><button class="btn btn-secondary" id="backToRoadCompleteBtn">Road Menu</button></div>
<div id="rewardScreen" class="reward-screen" style="display:none;"><h2>🏆 Master Driver</h2><div class="reward-code" id="rewardCodeDisplay">GR10-XXXX</div><button class="btn" id="resetAllBtn">Copy & Reset</button></div>
<div id="adSequencePanel" class="ad-sequence-panel" style="display:none;"><div class="ad-sequence-card"><div id="adStepMessage">Loading ad...</div><div id="adDescription">Please complete</div><button id="nextStepAdBtn" class="next-step-btn" style="display:none;">➡ Next Step</button><div id="adLoadingIndicator">Processing...</div></div></div>

<script>
(function(){
    const MAX_LEVEL = 10;
    let currentUnlockedLevel = 1, activeGameLevel = null, buttonClickState = [], gameCompletedFlag = false, isProcessing = false, adSequenceActive = false, pendingResolve = null;
    let adController = null;
    const RICHADS_UNIT = "393872";
    
    function isTelegramWebView() { return !!window.TelegramWebviewProxy || !!window.Telegram || navigator.userAgent.includes('Telegram'); }
    
    function showOfflineExit(msg) { alert(msg); forceExit(); }
    function forceExit() {
        document.getElementById('gamePanel').style.display = 'none';
        document.getElementById('adSequencePanel').style.display = 'none';
        document.getElementById('countdownOverlay').style.display = 'none';
        document.getElementById('levelCompleteScreen').style.display = 'none';
        document.getElementById('rewardScreen').style.display = 'none';
        if(pendingResolve) pendingResolve();
        pendingResolve = null;
        adSequenceActive = false; isProcessing = false;
    }
    function isNetworkOnline() { return navigator.onLine; }
    
    function loadProgress() { try { let s = localStorage.getItem('greenRoadProgress'); if(s) currentUnlockedLevel = Math.min(MAX_LEVEL, JSON.parse(s).unlockedLevel||1); } catch(e){} }
    function saveProgress() { localStorage.setItem('greenRoadProgress', JSON.stringify({unlockedLevel:currentUnlockedLevel})); }
    
    function initAdsgram() { if(window.Adsgram) adController = window.Adsgram.init({blockId:"int-24179"}); }
    
    function withGuard(fn, name) {
        return new Promise(async (res) => {
            if(!isNetworkOnline()) { showOfflineExit(`No internet for ${name}`); res(); return; }
            let tid = setTimeout(()=>{ console.warn(name+" timeout"); res(); }, 12000);
            try { await fn(); clearTimeout(tid); res(); } catch(e) { clearTimeout(tid); console.error(name,e); if(!isNetworkOnline()) showOfflineExit(`Network lost ${name}`); res(); }
        });
    }
    function showAdsgram() { return withGuard(async()=>{ if(adController) await adController.show(); }, "Adsgram"); }
    function showMonetag() { return withGuard(async()=>{ if(window.show_10541383) await window.show_10541383(); }, "Monetag"); }
    
    // ----- Improved RichAds Playable -----
    function showRichAds() {
        return withGuard(async () => {
            if (!window.TelegramAdsController) {
                console.error("TelegramAdsController missing. Run in Telegram WebView.");
                if(!isTelegramWebView()) alert("This game works only inside Telegram!");
                return;
            }
            const ctrl = window.TelegramAdsController;
            // Ensure initialized (already done in global script, but re-check)
            if(typeof ctrl.initialize === 'function') {
                await ctrl.initialize({ pubId: "1008310", appId: "7019" });
            }
            // Try multiple possible show methods with unit ID
            let promise = null;
            if (typeof ctrl.showInterstitial === 'function') promise = ctrl.showInterstitial(RICHADS_UNIT);
            else if (typeof ctrl.showRewardedAd === 'function') promise = ctrl.showRewardedAd(RICHADS_UNIT);
            else if (typeof ctrl.showAd === 'function') promise = ctrl.showAd(RICHADS_UNIT);
            else if (typeof ctrl.display === 'function') promise = ctrl.display(RICHADS_UNIT);
            else if (typeof ctrl.showPlayableAd === 'function') promise = ctrl.showPlayableAd(RICHADS_UNIT);
            else {
                console.warn("No known method found. Available methods:", Object.keys(ctrl).filter(k=>typeof ctrl[k]==='function'));
                // Fallback: wait and assume ad shown
                await new Promise(r=>setTimeout(r,2000));
                return;
            }
            if(promise && typeof promise.then === 'function') await promise;
            else await new Promise(r=>setTimeout(r,2000));
            console.log("RichAds playable completed (or skipped)");
        }, "RichAdsPlayable");
    }
    
    // UI for ad sequence
    const seqPanel = document.getElementById('adSequencePanel');
    const stepMsg = document.getElementById('adStepMessage');
    const stepDesc = document.getElementById('adDescription');
    const nextBtn = document.getElementById('nextStepAdBtn');
    const loadingSpan = document.getElementById('adLoadingIndicator');
    function showAdUI(msg, desc) { stepMsg.innerText = msg; stepDesc.innerText = desc; nextBtn.style.display = 'none'; loadingSpan.style.display = 'block'; seqPanel.style.display = 'flex'; }
    function hideAdUI() { seqPanel.style.display = 'none'; if(pendingResolve) pendingResolve(); pendingResolve=null; }
    function waitForNext() {
        return new Promise((resolve) => {
            pendingResolve = resolve;
            nextBtn.style.display = 'block';
            loadingSpan.style.display = 'none';
            nextBtn.onclick = () => { nextBtn.style.display='none'; if(pendingResolve) pendingResolve(); pendingResolve=null; resolve(); };
        });
    }
    
    async function runFullAdSequence() {
        if(!isNetworkOnline()) throw new Error("offline");
        showAdUI("Step 1/3: Adsgram", "Watch ad to continue");
        await showAdsgram();
        showAdUI("Step 1 Complete", "Click Next");
        await waitForNext();
        if(!isNetworkOnline()) throw new Error("offline");
        
        showAdUI("Step 2/3: Monetag", "Loading reward ad");
        await showMonetag();
        showAdUI("Step 2 Complete", "Click Next for final ad");
        await waitForNext();
        if(!isNetworkOnline()) throw new Error("offline");
        
        showAdUI("Step 3/3: RichAds Playable", "Interactive playable ad (unit 393872)");
        await showRichAds();
        showAdUI("All ads done!", "Starting game...");
        await new Promise(r=>setTimeout(r,500));
        hideAdUI();
    }
    
    async function startLevelEntry(level) {
        if(adSequenceActive || isProcessing) return false;
        if(!isNetworkOnline()) { showOfflineExit("Internet required"); return false; }
        adSequenceActive = true; isProcessing = true;
        document.getElementById('gamePanel').style.display = 'none';
        try {
            await runFullAdSequence();
            if(!isNetworkOnline()) throw new Error("offline");
            activeGameLevel = level;
            buttonClickState = [false,false,false,false,false];
            gameCompletedFlag = false;
            renderGamePanel(level);
            document.getElementById('gamePanel').style.display = 'flex';
            adSequenceActive = false; isProcessing = false;
            return true;
        } catch(e) {
            hideAdUI(); adSequenceActive = false; isProcessing = false;
            showOfflineExit("Ad failed. Back to menu");
            return false;
        }
    }
    
    function renderGamePanel(level) {
        document.getElementById('gameLevelTitle').innerHTML = `ROUTE ${level}`;
        let clicked = buttonClickState.filter(v=>v).length;
        document.getElementById('gameProgressText').innerHTML = `${clicked}/5 tasks`;
        const grid = document.getElementById('buttonsGrid');
        grid.innerHTML = '';
        const tasks = ['Green Signal','Yield Lane','Stop Ahead','Crosswalk','Road Merge'];
        for(let i=0;i<5;i++) {
            let btn = document.createElement('button');
            btn.className = 'action-btn' + (buttonClickState[i] ? ' disabled-btn' : '');
            btn.innerText = buttonClickState[i] ? tasks[i]+' ✓' : tasks[i];
            if(buttonClickState[i]) btn.disabled = true;
            btn.onclick = () => {
                if(gameCompletedFlag) return;
                if(buttonClickState[i]) return;
                buttonClickState[i] = true;
                renderGamePanel(level);
                if(buttonClickState.every(v=>v) && !gameCompletedFlag) {
                    gameCompletedFlag = true;
                    handleLevelComplete(activeGameLevel);
                }
            };
            grid.appendChild(btn);
        }
    }
    
    async function handleLevelComplete(level) {
        if(isProcessing) return;
        isProcessing = true;
        document.getElementById('gamePanel').style.display = 'none';
        if(level === currentUnlockedLevel && level < MAX_LEVEL) {
            currentUnlockedLevel = level+1;
            saveProgress(); buildLevelList();
        } else if(level > currentUnlockedLevel) {
            currentUnlockedLevel = level;
            saveProgress(); buildLevelList();
        }
        if(level === MAX_LEVEL) showRewardScreen();
        else showLevelComplete(level);
        isProcessing = false;
    }
    function showLevelComplete(level) {
        let div = document.getElementById('levelCompleteScreen');
        div.dataset.currentLevel = level;
        div.style.display = 'flex';
    }
    async function handleNextLevel(current) {
        let next = current+1;
        if(next > MAX_LEVEL) { document.getElementById('levelCompleteScreen').style.display='none'; showRewardScreen(); return; }
        document.getElementById('levelCompleteScreen').style.display='none';
        isProcessing = true;
        // countdown
        let overlay = document.getElementById('countdownOverlay');
        let countNum = document.getElementById('countdownNum');
        overlay.style.display = 'flex';
        for(let i=3;i>=1;i--) { countNum.innerText = i; await new Promise(r=>setTimeout(r,1000)); if(!isNetworkOnline()) break; }
        overlay.style.display = 'none';
        if(!isNetworkOnline()) { showOfflineExit("Network lost"); isProcessing=false; return; }
        let success = await startLevelEntry(next);
        if(!success) isProcessing = false;
        else isProcessing = false;
    }
    function showRewardScreen() { document.getElementById('rewardCodeDisplay').innerText = 'GR10-'+Math.random().toString(36).substr(2,8).toUpperCase(); document.getElementById('rewardScreen').style.display='flex'; }
    function resetGame() { currentUnlockedLevel=1; saveProgress(); buildLevelList(); forceExit(); }
    function buildLevelList() {
        let container = document.getElementById('levelListContainer');
        container.innerHTML = '';
        for(let i=1;i<=MAX_LEVEL;i++) {
            let unlocked = i <= currentUnlockedLevel;
            let card = document.createElement('div');
            card.className = 'level-card' + (unlocked ? '' : ' locked');
            if(unlocked) card.onclick = () => startLevelEntry(i);
            card.innerHTML = `<div class="level-number">${i}</div><div class="level-info"><div class="level-name">Route ${i}</div><div class="level-requirement">5 tasks</div></div><div>${unlocked? (i<currentUnlockedLevel?'✓':'🔓'):'🔒'}</div>`;
            container.appendChild(card);
        }
    }
    function bindEvents() {
        document.getElementById('nextLevelBtnFromComplete').onclick = () => { let lvl = parseInt(document.getElementById('levelCompleteScreen').dataset.currentLevel); if(lvl) handleNextLevel(lvl); };
        document.getElementById('backToRoadCompleteBtn').onclick = () => { document.getElementById('levelCompleteScreen').style.display='none'; };
        document.getElementById('resetAllBtn').onclick = () => { navigator.clipboard.writeText(document.getElementById('rewardCodeDisplay').innerText); resetGame(); };
        document.getElementById('exitGameBtn').onclick = () => { forceExit(); };
    }
    window.addEventListener('load', () => { loadProgress(); initAdsgram(); buildLevelList(); bindEvents(); if(!isTelegramWebView()) console.warn("Not in Telegram WebView - RichAds may not work"); });
    window.addEventListener('beforeunload', () => saveProgress());
})();
</script>
</body>
</html>
