<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Earn App</title>

<script src="https://w.tads.me/widget.js"></script>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: linear-gradient(135deg, #4facfe, #00f2fe);
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

.container {
    background: white;
    padding: 25px;
    border-radius: 15px;
    text-align: center;
    width: 280px;
}

button {
    padding: 12px 20px;
    border: none;
    border-radius: 10px;
    background: #007bff;
    color: white;
    font-size: 16px;
}
</style>
</head>

<body>

<div class="container">
    <h2>Earn App</h2>
    <p>Click Start to watch ads</p>

    <!-- Ad Container -->
    <div id="tads-container-9689"></div>

    <br><br>
    <button id="startBtn">Start</button>
</div>

<script>
document.addEventListener("DOMContentLoaded", function () {

    const adController = window.tads.init({
        widgetId: "9689",
        type: "fullscreen",
        debug: false,

        onShowReward: function (res) {
            alert("Ad watched! Reward added");
            console.log(res);
        },

        onAdsNotFound: function () {
            alert("No ads available, try later");
        }
    });

    document.getElementById("startBtn").addEventListener("click", function () {
        adController.loadAd()
            .then(() => adController.showAd())
            .catch(() => alert("Ad failed"));
    });

});
</script>

</body>
</html>
