<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Start Ads</title>

  <!-- Ad Script -->
  <script src="https://js.onclckvd.com/in-stream-ad-admanager/tma.js"></script>
</head>

<body>

<button onclick="startAd()">Start & Earn</button>

<script>
let showAd = null;

// Initialize ad
window.initCdTma?.({ id: 6117840 })
  .then(fn => {
    showAd = fn;
    console.log("Ad Ready ✅");
  })
  .catch(err => {
    console.log("Init Error ❌", err);
  });

function startAd() {

  // যদি ad ready না হয়
  if (!showAd) {
    console.log("Ad not ready ❌");

    // fallback redirect
    window.location.href = "https://your-link.com";
    return;
  }

  // show ad
  showAd()
    .then(() => {
      console.log("Ad Played ✅");

      // ad শেষে redirect
      window.location.href = "https://your-link.com";
    })
    .catch(err => {
      console.log("Ad Failed ❌", err);

      // fail হলেও redirect
      window.location.href = "https://your-link.com";
    });
}
</script>

</body>
</html>
