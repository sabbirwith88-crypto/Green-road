<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Earn App</title>

<script src="https://w.tads.me/widget.js"></script>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg, #4facfe, #00f2fe);
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

/* Card ডিজাইন */
.container {
    background: white;
    padding: 30px;
    border-radius: 15px;
    text-align: center;
    width: 300px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.2);
}

h1 {
    margin-bottom: 10px;
}

/* Balance */
.balance {
    font-size: 20px;
    margin: 15px 0;
}

/* Button */
button {
    padding: 12px 25px;
    border: none;
    border-radius: 10px;
    background: #4facfe;
    color: white;
    font-size: 16px;
    cursor: pointer;
    transition: 0.3s;
}

button:hover {
    background: #007bff;
}
</style>
</head>

<body>

<div class="container">
    <h1>Earn Money</h1>
    <p>Watch ads & earn coins</p>

    <div class="balance">Balance: <span id="balance">0</span></div>

    <button id="startBtn">Start</button>
</div>

<script>
let balance = 0;

const adController = window.tads.init({
    widgetId: "9689", // তোমার widget id
    type: "fullscreen",
    debug: false,

    onShowReward: function () {
        balance += 10; // প্রতি ad = 10 coin
        document.getElementById("balance").innerText = balance;
        alert("Ad watched! +10 coins");
    },

    onAdsNotFound: function () {
        alert("No ads available, try later");
    }
});

document.getElementById("startBtn").onclick = function () {
    adController.loadAd()
        .then(() => adController.showAd())
        .catch(() => alert("Ad failed"));
};
</script>

</body>
</html>
