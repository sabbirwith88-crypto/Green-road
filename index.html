<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>Nexus 10 | 5 Ads + Link | Telegram Mini App</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: system-ui, 'Segoe UI', Roboto, sans-serif;
    }
    body {
      background: radial-gradient(circle at 10% 20%, #0a0a0a, #000000);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1rem;
    }
    .dashboard {
      max-width: 700px;
      width: 100%;
      background: #0f0f0f;
      border-radius: 2.5rem;
      box-shadow: 0 25px 45px -12px rgba(0,0,0,0.8), 0 0 0 1px rgba(255,255,255,0.05);
      overflow: hidden;
    }
    .hero {
      background: linear-gradient(135deg, #101010, #1a1a1a);
      padding: 1.2rem;
      text-align: center;
      border-bottom: 1px solid #2a2a2a;
    }
    .date { font-size: 1rem; background: rgba(255,255,255,0.08); display: inline-block; padding: 0.2rem 0.9rem; border-radius: 40px; color: #ccc; }
    .time { font-size: 2.2rem; font-weight: 800; font-family: monospace; color: white; margin-top: 0.3rem; }
    .global-status {
      margin-top: 0.5rem;
      background: rgba(0,0,0,0.6);
      border-radius: 60px;
      padding: 0.3rem 0.9rem;
      font-weight: 600;
      font-size: 0.9rem;
      display: inline-block;
    }
    .status-complete { background: #1e4a3b; box-shadow: 0 0 8px #2ecc71; color: #d0ffec; }
    .status-notcomplete { background: #5a2a2a; color: #ffcfcf; }
    .tasks-section {
      padding: 1.5rem 1.2rem 1rem;
      background: #0b0b0b;
    }
    .tasks-header {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      margin-bottom: 1rem;
      border-bottom: 1px solid #2c2c2c;
      padding-bottom: 0.4rem;
    }
    .tasks-header h2 { font-size: 1.4rem; background: linear-gradient(120deg, #ddd, #aaa); background-clip: text; -webkit-background-clip: text; color: transparent; }
    .progress { background: #1e1e1e; padding: 0.2rem 0.7rem; border-radius: 30px; font-weight: 600; color: #bbb; font-size: 0.8rem; }
    .task-list {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 0.6rem;
    }
    .task-item {
      background: #141414;
      border: 1px solid #2a2a2a;
      border-radius: 1.5rem;
      padding: 0.7rem 1rem;
      display: flex;
      align-items: center;
      gap: 0.8rem;
      cursor: pointer;
      transition: 0.2s;
    }
    .task-item:hover { background: #1f1f1f; border-color: #3b82f6; transform: translateY(-1px); }
    .task-icon {
      font-family: monospace;
      background: #1a1a1a;
      padding: 0.2rem 0.5rem;
      border-radius: 1rem;
      font-size: 0.75rem;
      min-width: 70px;
      text-align: center;
    }
    .task-text { flex: 1; font-size: 0.9rem; font-weight: 500; color: #e0e0e0; }
    .task-item.completed { background: #0f2a1f; border-left: 4px solid #2ecc71; }
    .task-item.completed .task-text { text-decoration: line-through; color: #8fbc9a; }
    .modal-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.96);
      backdrop-filter: blur(6px);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 2000;
    }
    .modal-card {
      background: #1a1a1a;
      border-radius: 2rem;
      max-width: 460px;
      width: 90%;
      padding: 1.3rem;
      border: 1px solid #3b82f6;
      text-align: center;
    }
    .modal-card h3 { color: #fff; margin-bottom: 0.6rem; font-size: 1.3rem; }
    .step-status {
      background: #0f0f0f;
      padding: 0.7rem;
      border-radius: 1rem;
      margin: 0.8rem 0;
      text-align: left;
      max-height: 300px;
      overflow-y: auto;
    }
    .step-item {
      padding: 0.3rem 0;
      border-left: 2px solid #333;
      padding-left: 0.6rem;
      margin: 0.3rem 0;
      font-size: 0.8rem;
      color: #bbb;
    }
    .step-active { color: #f5b042; border-left-color: #f5b042; font-weight: bold; }
    .step-done { color: #2ecc71; border-left-color: #2ecc71; text-decoration: line-through; }
    .step-pending { color: #666; }
    .cancel-chain-btn, .continue-btn {
      background: #5a2a2a;
      border: none;
      padding: 0.5rem 1rem;
      border-radius: 2rem;
      font-weight: 600;
      color: white;
      cursor: pointer;
      margin-top: 0.5rem;
      font-size: 0.85rem;
    }
    .continue-btn { background: #2c7a5a; margin-left: 0.5rem; }
    .toast {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      background: #2ecc71dd;
      backdrop-filter: blur(12px);
      color: #000;
      padding: 0.4rem 1rem;
      border-radius: 2rem;
      font-weight: 600;
      z-index: 2100;
      font-size: 0.8rem;
      animation: fadeOut 2s ease forwards;
      white-space: nowrap;
    }
    @keyframes fadeOut {
      0% { opacity: 1; }
      70% { opacity: 1; }
      100% { opacity: 0; visibility: hidden; }
    }
    .reward-panel {
      margin: 0.8rem 1.2rem 1.2rem;
      background: linear-gradient(135deg, #0e1a16, #07120e);
      border-radius: 1.5rem;
      padding: 0.8rem;
      border: 1px solid rgba(46,204,113,0.5);
      text-align: center;
    }
    .reward-code {
      font-family: monospace;
      font-size: 0.9rem;
      font-weight: bold;
      color: #c3ffd6;
      background: #0c1c15;
      display: inline-block;
      padding: 0.2rem 0.7rem;
      border-radius: 2rem;
      margin: 0.3rem 0;
    }
    .copy-btn {
      background: linear-gradient(95deg, #2c7a5a, #1e563e);
      border: none;
      padding: 0.4rem 0.9rem;
      border-radius: 2rem;
      font-weight: 600;
      color: white;
      cursor: pointer;
    }
    .timer-badge {
      background: #1f1f2a;
      padding: 0.2rem 0.6rem;
      border-radius: 2rem;
      font-family: monospace;
      color: #f5b042;
      display: inline-block;
      margin-left: 0.5rem;
      font-size: 0.7rem;
    }
    .info {
      margin-top: 0.8rem;
      text-align: center;
      font-size: 0.65rem;
      color: #6b6b6b;
      background: #111;
      padding: 0.3rem;
      border-radius: 1.2rem;
    }
  </style>
  <!-- Ad SDKs -->
  <script src="https://ad.gigapub.tech/script?id=6331"></script>
  <script src="//libtl.com/sdk.js" data-zone="10675499" data-sdk="show_10675499"></script>
  <script src="https://adexora.com/cdn/ads.js?id=1964"></script>
  <script src="https://sad.adsgram.ai/js/sad.min.js"></script>
  <!-- RichAds / Telegram Ads -->
  <script src="https://richinfo.co/richpartners/telegram/js/tg-ob.js"></script>
  <script>
    // Initialize TelegramAdsController globally (will be available after script loads)
    window.TelegramAdsController = new TelegramAdsController();
    window.TelegramAdsController.initialize({
      pubId: "1008310",
      appId: "7019",
    });
  </script>
</head>
<body>
<div class="dashboard">
  <div class="hero">
    <div class="date" id="currentDate"></div>
    <div class="time" id="currentTime"></div>
    <div class="global-status" id="globalStatus">
      <span id="statusText">0 / 10 levels</span>
    </div>
  </div>
  <div class="tasks-section">
    <div class="tasks-header">
      <h2>⚡ 10 LEVELS (5 Ads) ⚡</h2>
      <div class="progress" id="progressCounter">0 / 10</div>
    </div>
    <ul class="task-list" id="taskList"></ul>
    <div class="info">
      🔥 FLOW: Link → Ad1(Giga) → Ad2(Adsgram) → Ad3(Monetag) → Ad4(Adexora) → Ad5(RichAds) → Final Link → Complete<br>
      ✅ Auto retry for all ads. Tap "Continue" after each link.
    </div>
  </div>
  <div id="rewardPanel" class="reward-panel" style="display: none;">
    <h3 style="font-size:1.1rem;">🏆 REWARD UNLOCKED 🏆</h3>
    <div class="reward-code" id="rewardCode">----</div>
    <div>
      <button class="copy-btn" id="copyBtn">📋 Copy & Reset</button>
      <span class="timer-badge" id="timerDisplay">30s left</span>
    </div>
    <div id="expiredMsg" style="font-size:0.65rem;"></div>
  </div>
</div>

<script>
(function(){
  const TOTAL_LEVELS = 10;
  const STORAGE_KEY = 'nexus_5ads_final';
  const LINK1 = "https://www.effectivecpmnetwork.com/xan60uuv?key=369dc68341066c06e3d471f3785f73fb";
  const LINK2 = "https://omg10.com/4/10883007";

  let tasks = [];
  let activeLevel = null;
  let rewardActive = false;
  let rewardTimer = null;
  let rewardSeconds = 30;
  let currentCode = '';

  // DOM
  const taskListEl = document.getElementById('taskList');
  const progressSpan = document.getElementById('progressCounter');
  const statusDiv = document.getElementById('globalStatus');
  const statusText = document.getElementById('statusText');
  const rewardPanel = document.getElementById('rewardPanel');
  const rewardCodeSpan = document.getElementById('rewardCode');
  const copyBtn = document.getElementById('copyBtn');
  const timerSpan = document.getElementById('timerDisplay');
  const expiredMsgDiv = document.getElementById('expiredMsg');

  function toast(msg, color="#2ecc71") {
    const t = document.createElement('div');
    t.className = 'toast';
    t.innerText = msg;
    t.style.background = color + 'dd';
    document.body.appendChild(t);
    setTimeout(() => t.remove(), 2200);
  }
  function log(msg) { console.log("[Nexus]", msg); }

  // Data
  function freshTasks() {
    return Array.from({length: TOTAL_LEVELS}, (_,i) => ({id: i+1, completed: false}));
  }
  function saveTasks() { localStorage.setItem(STORAGE_KEY, JSON.stringify(tasks)); }
  function loadTasks() {
    try {
      const raw = localStorage.getItem(STORAGE_KEY);
      if (!raw) return freshTasks();
      const p = JSON.parse(raw);
      if (Array.isArray(p) && p.length === TOTAL_LEVELS) return p.map(t=>({id:t.id, completed:!!t.completed}));
      return freshTasks();
    } catch(e) { return freshTasks(); }
  }
  function isCompleted(id) { return tasks.find(t=>t.id===id)?.completed || false; }
  function completeLevel(id) {
    const t = tasks.find(t=>t.id===id);
    if (!t || t.completed) return false;
    t.completed = true;
    saveTasks();
    renderTasks();
    toast(`✅ Level ${id} completed!`);
    if (tasks.every(t=>t.completed) && !rewardActive && rewardPanel.style.display !== 'block') activateReward();
    return true;
  }

  // Reward
  function generateCode() {
    const d = new Date();
    return `NEXUS-${d.getFullYear()}${String(d.getMonth()+1).padStart(2,'0')}${String(d.getDate()).padStart(2,'0')}-${String(d.getHours()).padStart(2,'0')}${String(d.getMinutes()).padStart(2,'0')}${String(d.getSeconds()).padStart(2,'0')}`;
  }
  function activateReward() {
    if (rewardActive) return;
    if (rewardTimer) clearInterval(rewardTimer);
    currentCode = generateCode();
    rewardCodeSpan.innerText = currentCode;
    rewardSeconds = 30;
    timerSpan.innerText = '30s left';
    expiredMsgDiv.innerHTML = '';
    copyBtn.disabled = false;
    rewardPanel.style.display = 'block';
    rewardActive = true;
    rewardTimer = setInterval(() => {
      if (!rewardActive) { if (rewardTimer) clearInterval(rewardTimer); rewardTimer = null; return; }
      rewardSeconds--;
      if (rewardSeconds >= 0) {
        timerSpan.innerText = `${rewardSeconds}s left`;
        if (rewardSeconds === 0) {
          copyBtn.disabled = true;
          expiredMsgDiv.innerHTML = '<span style="color:#e67e22;">⏰ Expired. Complete all 10 again.</span>';
          timerSpan.innerText = 'Expired';
          rewardActive = false;
          if (rewardTimer) clearInterval(rewardTimer);
          rewardTimer = null;
          rewardPanel.style.display = 'none';
        }
      } else {
        if (rewardTimer) clearInterval(rewardTimer);
        rewardTimer = null;
        rewardPanel.style.display = 'none';
        rewardActive = false;
      }
    }, 1000);
  }
  function fullReset() {
    if (activeLevel && activeLevel.cancel) { activeLevel.cancel(); activeLevel = null; }
    tasks = freshTasks();
    saveTasks();
    if (rewardTimer) clearInterval(rewardTimer);
    rewardActive = false;
    rewardPanel.style.display = 'none';
    copyBtn.disabled = false;
    expiredMsgDiv.innerHTML = '';
    timerSpan.innerText = '30s left';
    currentCode = '';
    renderTasks();
    toast("🔄 Reset! Start over.", "#f39c12");
  }

  // SDK waiting utility
  function waitForSDK(check, name, timeoutMs = 15000) {
    return new Promise((resolve, reject) => {
      const start = Date.now();
      const interval = setInterval(() => {
        if (check()) {
          clearInterval(interval);
          log(`${name} SDK ready`);
          resolve();
        } else if (Date.now() - start > timeoutMs) {
          clearInterval(interval);
          reject(new Error(`${name} SDK not loaded`));
        }
      }, 300);
    });
  }

  // Individual ad functions with retry
  async function showGiga(retries = 2) {
    await waitForSDK(() => typeof window.showGiga === 'function', "GigaPub", 12000);
    for (let i = 0; i <= retries; i++) {
      try {
        await window.showGiga();
        log("Giga ad done");
        return;
      } catch(e) { log(`Giga retry ${i+1} failed`); if (i===retries) throw e; await new Promise(r=>setTimeout(r,1000)); }
    }
  }
  async function showAdsgram(retries = 2) {
    await waitForSDK(() => window.Adsgram && typeof window.Adsgram.init === 'function', "Adsgram", 12000);
    let ctrl;
    try { ctrl = window.Adsgram.init({ blockId: "int-24179" }); } catch(e) { throw new Error("Adsgram init error"); }
    if (!ctrl || typeof ctrl.show !== 'function') throw new Error("Invalid Adsgram");
    for (let i = 0; i <= retries; i++) {
      try {
        await ctrl.show();
        log("Adsgram ad done");
        return;
      } catch(e) { log(`Adsgram retry ${i+1} failed`); if (i===retries) throw e; await new Promise(r=>setTimeout(r,1000)); }
    }
  }
  async function showMonetag(retries = 2) {
    await waitForSDK(() => typeof window.show_10675499 === 'function', "Monetag", 12000);
    for (let i = 0; i <= retries; i++) {
      try {
        await window.show_10675499();
        log("Monetag ad done");
        return;
      } catch(e) { log(`Monetag retry ${i+1} failed`); if (i===retries) throw e; await new Promise(r=>setTimeout(r,1000)); }
    }
  }
  async function showAdexora(retries = 2) {
    await waitForSDK(() => typeof window.showAdexora === 'function', "Adexora", 12000);
    for (let i = 0; i <= retries; i++) {
      try {
        await window.showAdexora();
        log("Adexora ad done");
        return;
      } catch(e) { log(`Adexora retry ${i+1} failed`); if (i===retries) throw e; await new Promise(r=>setTimeout(r,1000)); }
    }
  }
  async function showRichAds(retries = 2) {
    // Wait for the TelegramAdsController to be ready and have showInterstitial method
    await waitForSDK(() => window.TelegramAdsController && typeof window.TelegramAdsController.showInterstitial === 'function', "RichAds", 15000);
    for (let i = 0; i <= retries; i++) {
      try {
        log("Calling RichAds interstitial...");
        await window.TelegramAdsController.showInterstitial();
        log("RichAds ad done");
        return;
      } catch(e) {
        log(`RichAds retry ${i+1} failed: ${e.message || e}`);
        if (i === retries) throw new Error("RichAds interstitial failed");
        await new Promise(r => setTimeout(r, 1000));
      }
    }
  }

  // Ad steps with fallback (primary network first, then others)
  async function ad1() {
    const attempts = [
      { name: "GigaPub", fn: showGiga },
      { name: "Adsgram", fn: showAdsgram },
      { name: "Monetag", fn: showMonetag },
      { name: "Adexora", fn: showAdexora },
      { name: "RichAds", fn: showRichAds }
    ];
    for (const a of attempts) {
      try { await a.fn(); toast(`✅ Ad 1 completed (${a.name})`); return; }
      catch(e) { log(`${a.name} failed for Ad1`); toast(`⚠️ ${a.name} failed, trying next...`, "#f39c12"); }
    }
    throw new Error("Ad 1 - all networks failed");
  }
  async function ad2() {
    const attempts = [
      { name: "Adsgram", fn: showAdsgram },
      { name: "GigaPub", fn: showGiga },
      { name: "Monetag", fn: showMonetag },
      { name: "Adexora", fn: showAdexora },
      { name: "RichAds", fn: showRichAds }
    ];
    for (const a of attempts) {
      try { await a.fn(); toast(`✅ Ad 2 completed (${a.name})`); return; }
      catch(e) { log(`${a.name} failed for Ad2`); toast(`⚠️ ${a.name} failed, trying next...`, "#f39c12"); }
    }
    throw new Error("Ad 2 failed");
  }
  async function ad3() {
    const attempts = [
      { name: "Monetag", fn: showMonetag },
      { name: "GigaPub", fn: showGiga },
      { name: "Adsgram", fn: showAdsgram },
      { name: "Adexora", fn: showAdexora },
      { name: "RichAds", fn: showRichAds }
    ];
    for (const a of attempts) {
      try { await a.fn(); toast(`✅ Ad 3 completed (${a.name})`); return; }
      catch(e) { log(`${a.name} failed for Ad3`); toast(`⚠️ ${a.name} failed, trying next...`, "#f39c12"); }
    }
    throw new Error("Ad 3 failed");
  }
  async function ad4() {
    const attempts = [
      { name: "Adexora", fn: showAdexora },
      { name: "GigaPub", fn: showGiga },
      { name: "Adsgram", fn: showAdsgram },
      { name: "Monetag", fn: showMonetag },
      { name: "RichAds", fn: showRichAds }
    ];
    for (const a of attempts) {
      try { await a.fn(); toast(`✅ Ad 4 completed (${a.name})`); return; }
      catch(e) { log(`${a.name} failed for Ad4`); toast(`⚠️ ${a.name} failed, trying next...`, "#f39c12"); }
    }
    throw new Error("Ad 4 failed");
  }
  async function ad5() {
    // Primary RichAds, fallback others
    const attempts = [
      { name: "RichAds", fn: showRichAds },
      { name: "GigaPub", fn: showGiga },
      { name: "Adsgram", fn: showAdsgram },
      { name: "Monetag", fn: showMonetag },
      { name: "Adexora", fn: showAdexora }
    ];
    for (const a of attempts) {
      try { await a.fn(); toast(`✅ Ad 5 completed (${a.name})`); return; }
      catch(e) { log(`${a.name} failed for Ad5`); toast(`⚠️ ${a.name} failed, trying next...`, "#f39c12"); }
    }
    throw new Error("Ad 5 failed");
  }

  // Manual continue modal
  function waitForManual(msg) {
    return new Promise((resolve, reject) => {
      const overlay = document.createElement('div');
      overlay.className = 'modal-overlay';
      overlay.innerHTML = `
        <div class="modal-card">
          <h3>⏸️ Continue</h3>
          <p style="color:#ddd; margin:0.8rem 0;">${msg}</p>
          <button class="continue-btn" id="continueBtn">✅ Continue</button>
          <button class="cancel-chain-btn" id="cancelBtn" style="margin-left:0.5rem;">❌ Cancel</button>
        </div>
      `;
      document.body.appendChild(overlay);
      let done = false;
      const cleanup = () => { if (overlay.parentNode) overlay.remove(); };
      overlay.querySelector('#continueBtn').onclick = () => { if (done) return; done = true; cleanup(); resolve(); };
      overlay.querySelector('#cancelBtn').onclick = () => { if (done) return; done = true; cleanup(); reject(new Error("Cancelled")); };
    });
  }
  async function openLinkAndWait(url, instr) {
    window.open(url, '_blank');
    await waitForManual(instr + " Tap Continue after returning.");
  }

  // Level chain (6 steps: link, ad1, ad2, ad3, ad4, ad5, final link)
  async function runLevel(levelId, updateStep, cancelSig) {
    updateStep(0, 'active');
    await openLinkAndWait(LINK1, "Open initial link.");
    if (cancelSig.cancelled) throw new Error("Cancelled");
    updateStep(0, 'done');

    updateStep(1, 'active');
    await ad1();
    if (cancelSig.cancelled) throw new Error("Cancelled");
    updateStep(1, 'done');

    updateStep(2, 'active');
    await ad2();
    if (cancelSig.cancelled) throw new Error("Cancelled");
    updateStep(2, 'done');

    updateStep(3, 'active');
    await ad3();
    if (cancelSig.cancelled) throw new Error("Cancelled");
    updateStep(3, 'done');

    updateStep(4, 'active');
    await ad4();
    if (cancelSig.cancelled) throw new Error("Cancelled");
    updateStep(4, 'done');

    updateStep(5, 'active');
    await ad5();
    if (cancelSig.cancelled) throw new Error("Cancelled");
    updateStep(5, 'done');

    updateStep(6, 'active');
    await openLinkAndWait(LINK2, "Open final link.");
    if (cancelSig.cancelled) throw new Error("Cancelled");
    updateStep(6, 'done');
    return true;
  }

  function showModal(levelId, onComplete, onCancel) {
    const overlay = document.createElement('div');
    overlay.className = 'modal-overlay';
    const steps = [
      "🔗 1. Open initial link → Continue",
      "🎮 2. Ad 1 (Giga primary)",
      "📢 3. Ad 2 (Adsgram primary)",
      "📺 4. Ad 3 (Monetag primary)",
      "🎬 5. Ad 4 (Adexora primary)",
      "📱 6. Ad 5 (RichAds interstitial)",
      "🔗 7. Open final link → Continue → Complete"
    ];
    let statuses = steps.map(() => 'pending');
    const modalDiv = document.createElement('div');
    modalDiv.className = 'modal-card';
    modalDiv.innerHTML = `
      <h3>⚡ LEVEL ${levelId} PROGRESS</h3>
      <div class="step-status" id="stepContainer"></div>
      <button class="cancel-chain-btn" id="cancelBtn">✖ CANCEL LEVEL</button>
      <p style="font-size:10px; margin-top:6px;">Ads auto-retry on failure.</p>
    `;
    overlay.appendChild(modalDiv);
    document.body.appendChild(overlay);
    const container = modalDiv.querySelector('#stepContainer');
    function render(activeIdx = -1) {
      container.innerHTML = '';
      steps.forEach((label, idx) => {
        const div = document.createElement('div');
        div.className = 'step-item';
        div.innerText = label;
        if (statuses[idx] === 'done') div.classList.add('step-done');
        else if (idx === activeIdx && statuses[idx] !== 'done') div.classList.add('step-active');
        else div.classList.add('step-pending');
        container.appendChild(div);
      });
    }
    let cancelled = false;
    const cancelSig = { cancelled: false };
    const updateStep = (idx, state) => {
      if (cancelled) return;
      if (state === 'active') { statuses[idx] = 'pending'; render(idx); }
      else if (state === 'done') { statuses[idx] = 'done'; render(-1); }
    };
    modalDiv.querySelector('#cancelBtn').onclick = () => {
      cancelled = true;
      cancelSig.cancelled = true;
      overlay.remove();
      if (onCancel) onCancel();
      toast(`❌ Level ${levelId} cancelled`, "#e67e22");
    };
    runLevel(levelId, updateStep, cancelSig)
      .then(() => { if (!cancelled) { overlay.remove(); onComplete(); } })
      .catch(err => {
        if (!cancelled && err.message !== "Cancelled") {
          overlay.remove();
          toast(`❌ Error: ${err.message}. Retry level.`, "#e74c3c");
          if (onCancel) onCancel();
        } else if (cancelled) overlay.remove();
        else { overlay.remove(); if (onCancel) onCancel(); }
      });
    return { cancel: () => { cancelled = true; cancelSig.cancelled = true; overlay.remove(); } };
  }

  async function startLevel(levelId) {
    if (isCompleted(levelId)) { toast(`Level ${levelId} already done!`, "#f5b042"); return; }
    if (activeLevel && activeLevel.cancel) { toast("Another level in progress", "#e67e22"); return; }
    activeLevel = { cancel: null };
    const handler = showModal(
      levelId,
      () => { completeLevel(levelId); activeLevel = null; },
      () => { activeLevel = null; }
    );
    activeLevel.cancel = () => { if (handler && handler.cancel) handler.cancel(); };
  }

  function renderTasks() {
    taskListEl.innerHTML = '';
    const doneCount = tasks.filter(t=>t.completed).length;
    const allDone = doneCount === TOTAL_LEVELS;
    progressSpan.innerText = `${doneCount} / ${TOTAL_LEVELS}`;
    if (allDone && rewardActive) {
      statusText.innerText = "🎉 ALL 10 DONE! Copy reward code 🎉";
      statusDiv.classList.remove('status-notcomplete');
      statusDiv.classList.add('status-complete');
    } else if (allDone) {
      statusText.innerText = "✨ 10/10! Activating reward ✨";
      statusDiv.classList.add('status-complete');
    } else {
      statusText.innerText = `${doneCount} / 10 levels completed`;
      statusDiv.classList.remove('status-complete');
      statusDiv.classList.add('status-notcomplete');
    }
    for (let i=1; i<=TOTAL_LEVELS; i++) {
      const done = tasks.find(t=>t.id===i)?.completed || false;
      const li = document.createElement('li');
      li.className = 'task-item';
      if (done) li.classList.add('completed');
      li.setAttribute('data-id', i);
      li.innerHTML = `
        <span class="task-icon">${done ? "✓ DONE" : "▶ START"}</span>
        <span class="task-text">Level ${i} – ${done ? 'finished' : 'Link → Giga → Adsgram → Monetag → Adexora → RichAds → Link'}</span>
      `;
      taskListEl.appendChild(li);
    }
  }

  function onTaskClick(e) {
    const li = e.target.closest('.task-item');
    if (!li) return;
    const id = parseInt(li.getAttribute('data-id'), 10);
    if (!isNaN(id)) startLevel(id);
  }

  async function onCopyReset() {
    if (!rewardActive || rewardSeconds <= 0) {
      toast("❌ No active reward or expired. Complete all 10 again.", "#e74c3c");
      return;
    }
    try {
      await navigator.clipboard.writeText(currentCode);
      toast("🏆 Code copied! Progress reset.", "#2ecc71");
      fullReset();
    } catch(e) { toast("Copy failed, tap again", "#e67e22"); }
  }

  function updateDateTime() {
    const d = new Date();
    document.getElementById('currentDate').innerText = d.toLocaleDateString(undefined, { weekday:'long', year:'numeric', month:'long', day:'numeric' });
    document.getElementById('currentTime').innerText = d.toLocaleTimeString('en-GB', { hour:'2-digit', minute:'2-digit', second:'2-digit' });
  }

  taskListEl.addEventListener('click', onTaskClick);
  copyBtn.addEventListener('click', onCopyReset);
  tasks = loadTasks();
  renderTasks();
  if (tasks.every(t=>t.completed)) activateReward();
  setInterval(updateDateTime, 1000);
  updateDateTime();
  toast("✅ Ready! RichAds interstitial included.", "#2ecc71");
  log("Initialized with 5 ad networks, including RichAds.");
})();
</script>
</body>
</html>
