<!DOCTYPE html>
<html lang="en">
<head>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
    }

    body {
      background: radial-gradient(circle at 10% 20%, #0a0a0a, #000000);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.2rem;
    }

    .dashboard {
      max-width: 700px;
      width: 100%;
      background: #0f0f0f;
      border-radius: 2.5rem;
      box-shadow: 0 25px 45px -12px rgba(0,0,0,0.8), 0 0 0 1px rgba(255,255,255,0.05);
      overflow: hidden;
    }

    .hero {
      background: linear-gradient(135deg, #101010, #1a1a1a);
      padding: 1.5rem 1.5rem 1.8rem;
      text-align: center;
      border-bottom: 1px solid #2a2a2a;
    }

    .date {
      font-size: 1.2rem;
      background: rgba(255,255,255,0.08);
      display: inline-block;
      padding: 0.2rem 1rem;
      border-radius: 40px;
      color: #ccc;
    }
    .time {
      font-size: 2.6rem;
      font-weight: 800;
      font-family: monospace;
      color: white;
      margin-top: 0.4rem;
      letter-spacing: 1px;
    }

    .global-status {
      margin-top: 0.6rem;
      background: rgba(0,0,0,0.6);
      border-radius: 60px;
      padding: 0.4rem 1rem;
      font-weight: 600;
      font-size: 1rem;
      display: inline-block;
    }
    .status-complete { background: #1e4a3b; box-shadow: 0 0 8px #2ecc71; color: #d0ffec; }
    .status-notcomplete { background: #5a2a2a; color: #ffcfcf; }

    .tasks-section {
      padding: 1.8rem 1.5rem 1.2rem;
      background: #0b0b0b;
    }
    .tasks-header {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      margin-bottom: 1.2rem;
      border-bottom: 1px solid #2c2c2c;
      padding-bottom: 0.5rem;
    }
    .tasks-header h2 {
      font-size: 1.5rem;
      background: linear-gradient(120deg, #ddd, #aaa);
      background-clip: text;
      -webkit-background-clip: text;
      color: transparent;
    }
    .progress {
      background: #1e1e1e;
      padding: 0.2rem 0.9rem;
      border-radius: 30px;
      font-weight: 600;
      color: #bbb;
      border: 1px solid #333;
      font-size: 0.9rem;
    }

    .task-list {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 0.7rem;
    }
    .task-item {
      background: #141414;
      border: 1px solid #2a2a2a;
      border-radius: 1.6rem;
      padding: 0.8rem 1rem;
      display: flex;
      align-items: center;
      gap: 0.9rem;
      transition: all 0.2s;
      cursor: pointer;
    }
    .task-item:hover {
      transform: translateY(-2px);
      background: #1f1f1f;
      border-color: #3b82f6;
    }
    .task-icon {
      font-family: monospace;
      font-weight: bold;
      background: #1a1a1a;
      padding: 0.2rem 0.6rem;
      border-radius: 1rem;
      font-size: 0.8rem;
      min-width: 75px;
      text-align: center;
    }
    .task-text {
      flex: 1;
      font-size: 0.95rem;
      font-weight: 500;
      color: #e0e0e0;
    }
    .task-item.completed {
      background: #0f2a1f;
      border-left: 4px solid #2ecc71;
    }
    .task-item.completed .task-text {
      text-decoration: line-through;
      color: #8fbc9a;
    }

    /* Modal */
    .modal-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.96);

      justify-content: center;

    .modal-card {

    .step-status {

    .step-item {

    .step-active {

    }
    .step-done {
      color: #2ecc71;

    }

      color: #666;
    }
    .cancel-chain-btn, .continue-btn {
      background: #5a2a2a;
      border: none;
      padding: 0.5rem 1.1rem;
      border-radius: 2rem;
      font-weight: 600;
      color: white;
      cursor: pointer;
      margin-top: 0.6rem;
      font-size: 0.9rem;
    }
    .continue-btn {

    }
    .toast {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);

      backdrop-filter: blur(12px);
      color: #000;

    @keyframes fadeOut {
      0% { opacity: 1; }

      100% { opacity: 0; visibility: hidden; }
    }
    .reward-panel {
      margin: 0.8rem 1.5rem 1.5rem;
      background: linear-gradient(135deg, #0e1a16, #07120e);
      border-radius: 1.5rem;
      padding: 1rem;

    }
    .reward-code {
      font-family: monospace;

      color: #c3ffd6;
      background: #0c1c15;

  </style>

</head>

<div class="dashboard">
  <div class="hero">
    <div class="date" id="currentDate"></div>
    <div class="time" id="currentTime"></div>

      <button class="copy-btn" id="copyBtn">📋 Copy Code & Reset</button>

<script>
  (function() {
    // ---------- CONFIG ----------
    const TOTAL_LEVELS = 10;
    const STORAGE_KEY = 'nexus_telegram_final_v2';
    const LINK_FIRST = "https://www.effectivecpmnetwork.com/xan60uuv?key=369dc68341066c06e3d471f3785f73fb";
    const LINK_SECOND = "https://omg10.com/4/10883007";
    
    let tasks = [];
    let activeLevelObj = null;    // { cancelFn }
    let rewardActive = false;
    let rewardTimer = null;
    let rewardSeconds = 30;
    let currentRewardCode = '';
    
    // DOM elements
    const taskListEl = document.getElementById('taskList');
    const progressSpan = document.getElementById('progressCounter');
    const globalStatusDiv = document.getElementById('globalStatus');
    const statusTextSpan = document.getElementById('statusText');
    const rewardPanel = document.getElementById('rewardPanel');
    const rewardCodeSpan = document.getElementById('rewardCode');
    const copyBtn = document.getElementById('copyBtn');
    const timerDisplaySpan = document.getElementById('timerDisplay');
    const expiredMsgDiv = document.getElementById('expiredMsg');
    
    // ---------- Helper ----------
    function showToast(msg, color = "#2ecc71") {
      const toast = document.createElement('div');
      toast.className = 'toast';
      toast.innerText = msg;
      toast.style.background = color + 'dd';
      document.body.appendChild(toast);
      setTimeout(() => toast.remove(), 2200);
    }
    
    // ---------- Data ----------
    function createFreshTasks() {
      return Array.from({ length: TOTAL_LEVELS }, (_, i) => ({ id: i+1, completed: false }));
    }
    function saveTasks() { localStorage.setItem(STORAGE_KEY, JSON.stringify(tasks)); }
    function loadTasks() {
      const raw = localStorage.getItem(STORAGE_KEY);
      if (!raw) return createFreshTasks();
      try {
        const parsed = JSON.parse(raw);
        if (Array.isArray(parsed) && parsed.length === TOTAL_LEVELS) {
          return parsed.map(t => ({ id: t.id, completed: !!t.completed }));
        }
        return createFreshTasks();
      } catch(e) { return createFreshTasks(); }
    }
    
    function isLevelCompleted(id) { return tasks.find(t => t.id === id)?.completed || false; }
    
    function markLevelComplete(levelId) {
      const task = tasks.find(t => t.id === levelId);
      if (!task || task.completed) return false;
      task.completed = true;
      saveTasks();
      renderTasks();
      showToast(`✅ Level ${levelId} COMPLETED!`);
      const allCompleted = tasks.every(t => t.completed);
      if (allCompleted && !rewardActive && rewardPanel.style.display !== 'block') {
        activateReward();
      }
      return true;
    }
    
    // ---------- Reward System ----------
    function generateRewardCode() {
      const now = new Date();
      return `NEXUS-${now.getFullYear()}${String(now.getMonth()+1).padStart(2,'0')}${String(now.getDate()).padStart(2,'0')}-${String(now.getHours()).padStart(2,'0')}${String(now.getMinutes()).padStart(2,'0')}${String(now.getSeconds()).padStart(2,'0')}`;
    }
    
    function activateReward() {
      if (rewardActive) return;
      if (rewardTimer) clearInterval(rewardTimer);
      currentRewardCode = generateRewardCode();
      rewardCodeSpan.innerText = currentRewardCode;
      rewardSeconds = 30;
      timerDisplaySpan.innerText = `${rewardSeconds}s left`;
      expiredMsgDiv.innerHTML = '';
      copyBtn.disabled = false;
      rewardPanel.style.display = 'block';
      rewardActive = true;
      rewardTimer = setInterval(() => {
        if (!rewardActive) {
          if (rewardTimer) clearInterval(rewardTimer);
          rewardTimer = null;
          return;
        }
        rewardSeconds--;
        if (rewardSeconds >= 0) {
          timerDisplaySpan.innerText = `${rewardSeconds}s left`;
          if (rewardSeconds === 0) {
            copyBtn.disabled = true;
            expiredMsgDiv.innerHTML = '<span style="color:#e67e22;">⏰ Code expired. Complete all 10 again.</span>';
            timerDisplaySpan.innerText = 'Expired';
            rewardActive = false;
            if (rewardTimer) clearInterval(rewardTimer);
            rewardTimer = null;
            rewardPanel.style.display = 'none';
          }
        } else {
          if (rewardTimer) clearInterval(rewardTimer);
          rewardTimer = null;
          rewardPanel.style.display = 'none';
          rewardActive = false;
        }
      }, 1000);
    }
    
    function fullReset() {
      if (activeLevelObj && activeLevelObj.cancel) {
        activeLevelObj.cancel();
        activeLevelObj = null;
      }
      tasks = createFreshTasks();
      saveTasks();
      if (rewardTimer) clearInterval(rewardTimer);
      rewardActive = false;
      rewardPanel.style.display = 'none';
      copyBtn.disabled = false;
      expiredMsgDiv.innerHTML = '';
      timerDisplaySpan.innerText = '30s left';
      currentRewardCode = '';
      renderTasks();
      showToast("🔄 Progress reset! Start fresh.", "#f39c12");
    }
    
    // ---------- AD FUNCTIONS with fallback (generic names) ----------
    async function showAd1() {
      const providers = [
        { name: "Giga", fn: async () => { if (typeof window.showGiga !== 'function') throw new Error(); return window.showGiga(); } },
        { name: "Adsgram", fn: async () => { if (!window.Adsgram) throw new Error(); const c = window.Adsgram.init({ blockId: "int-24179" }); if (!c || typeof c.show !== 'function') throw new Error(); return c.show(); } },
        { name: "Monetag", fn: async () => { if (typeof window.show_10675499 !== 'function') throw new Error(); return window.show_10675499(); } },
        { name: "Adexora", fn: async () => { if (typeof window.showAdexora !== 'function') throw new Error(); return window.showAdexora(); } }
      ];
      for (const p of providers) {
        try {
          await p.fn();
          showToast("✅ Ad 1 completed");
          return;
        } catch(e) { console.warn(p.name + " failed", e); }
      }
      throw new Error("Ad 1 failed");
    }
    
    async function showAd2() {
      const providers = [
        { name: "Adsgram", fn: async () => { if (!window.Adsgram) throw new Error(); const c = window.Adsgram.init({ blockId: "int-24179" }); if (!c || typeof c.show !== 'function') throw new Error(); return c.show(); } },
        { name: "Giga", fn: async () => { if (typeof window.showGiga !== 'function') throw new Error(); return window.showGiga(); } },
        { name: "Monetag", fn: async () => { if (typeof window.show_10675499 !== 'function') throw new Error(); return window.show_10675499(); } },
        { name: "Adexora", fn: async () => { if (typeof window.showAdexora !== 'function') throw new Error(); return window.showAdexora(); } }
      ];
      for (const p of providers) {
        try {
          await p.fn();
          showToast("✅ Ad 2 completed");
          return;
        } catch(e) { console.warn(p.name + " failed", e); }
      }
      throw new Error("Ad 2 failed");
    }
    
    async function showAd3() {
      const providers = [
        { name: "Monetag", fn: async () => { if (typeof window.show_10675499 !== 'function') throw new Error(); return window.show_10675499(); } },
        { name: "Giga", fn: async () => { if (typeof window.showGiga !== 'function') throw new Error(); return window.showGiga(); } },
        { name: "Adsgram", fn: async () => { if (!window.Adsgram) throw new Error(); const c = window.Adsgram.init({ blockId: "int-24179" }); if (!c || typeof c.show !== 'function') throw new Error(); return c.show(); } },
        { name: "Adexora", fn: async () => { if (typeof window.showAdexora !== 'function') throw new Error(); return window.showAdexora(); } }
      ];
      for (const p of providers) {
        try {
          await p.fn();
          showToast("✅ Ad 3 completed");
          return;
        } catch(e) { console.warn(p.name + " failed", e); }
      }
      throw new Error("Ad 3 failed");
    }
    
    async function showAd4() {
      const providers = [
        { name: "Adexora", fn: async () => { if (typeof window.showAdexora !== 'function') throw new Error(); return window.showAdexora(); } },
        { name: "Giga", fn: async () => { if (typeof window.showGiga !== 'function') throw new Error(); return window.showGiga(); } },
        { name: "Adsgram", fn: async () => { if (!window.Adsgram) throw new Error(); const c = window.Adsgram.init({ blockId: "int-24179" }); if (!c || typeof c.show !== 'function') throw new Error(); return c.show(); } },
        { name: "Monetag", fn: async () => { if (typeof window.show_10675499 !== 'function') throw new Error(); return window.show_10675499(); } }
      ];
      for (const p of providers) {
        try {
          await p.fn();
          showToast("✅ Ad 4 completed");
          return;
        } catch(e) { console.warn(p.name + " failed", e); }
      }
      throw new Error("Ad 4 failed");
    }
    
    // ---------- Manual Continue Modal (Telegram friendly) ----------
    function waitForManualContinue(message) {
      return new Promise((resolve, reject) => {
        const overlay = document.createElement('div');
        overlay.className = 'modal-overlay';
        const card = document.createElement('div');
        card.className = 'modal-card';
        card.innerHTML = `
          <h3>⏸️ Continue Required</h3>
          <p style="color:#ddd; margin:0.8rem 0;">${message}</p>
          <button class="continue-btn" id="continueActionBtn">✅ Continue</button>
          <button class="cancel-chain-btn" id="cancelActionBtn" style="margin-left:0.5rem;">❌ Cancel</button>
        `;
        overlay.appendChild(card);
        document.body.appendChild(overlay);
        let resolved = false;
        const cleanup = () => { if (overlay.parentNode) overlay.remove(); };
        const onContinue = () => {
          if (resolved) return;
          resolved = true;
          cleanup();
          resolve();
        };
        const onCancel = () => {
          if (resolved) return;
          resolved = true;
          cleanup();
          reject(new Error("Cancelled by user"));
        };
        card.querySelector('#continueActionBtn').addEventListener('click', onContinue);
        card.querySelector('#cancelActionBtn').addEventListener('click', onCancel);
      });
    }
    
    async function openLinkAndWait(url, instruction) {
      window.open(url, '_blank');
      await waitForManualContinue(instruction + " Tap Continue after returning to this app.");
    }
    
    // ---------- Level Chain Runner ----------
    async function runLevelChain(levelId, updateStepCb, cancelSignal) {
      // Step 0: open first link
      updateStepCb(0, 'active');
      await openLinkAndWait(LINK_FIRST, "Open the initial link.");
      if (cancelSignal.cancelled) throw new Error("Cancelled");
      updateStepCb(0, 'done');
      
      // Step 1: Ad 1
      updateStepCb(1, 'active');
      await showAd1();
      if (cancelSignal.cancelled) throw new Error("Cancelled");
      updateStepCb(1, 'done');
      
      // Step 2: Ad 2
      updateStepCb(2, 'active');
      await showAd2();
      if (cancelSignal.cancelled) throw new Error("Cancelled");
      updateStepCb(2, 'done');
      
      // Step 3: Ad 3
      updateStepCb(3, 'active');
      await showAd3();
      if (cancelSignal.cancelled) throw new Error("Cancelled");
      updateStepCb(3, 'done');
      
      // Step 4: Ad 4
      updateStepCb(4, 'active');
      await showAd4();
      if (cancelSignal.cancelled) throw new Error("Cancelled");
      updateStepCb(4, 'done');
      
      // Step 5: final link
      updateStepCb(5, 'active');
      await openLinkAndWait(LINK_SECOND, "Open the final link.");
      if (cancelSignal.cancelled) throw new Error("Cancelled");
      updateStepCb(5, 'done');
      
      return true;
    }
    
    // ---------- Modal UI ----------
    function showLevelModal(levelId, onComplete, onCancel) {
      const overlay = document.createElement('div');
      overlay.className = 'modal-overlay';
      const steps = [
        "🔗 1. Open initial link → Continue",
        "🎮 2. Watch Ad 1",
        "📢 3. Watch Ad 2",
        "📺 4. Watch Ad 3",
        "🎬 5. Watch Ad 4",
        "🔗 6. Open final link → Continue → Complete"
      ];
      let stepStatuses = steps.map(() => 'pending');
      
      const modalDiv = document.createElement('div');
      modalDiv.className = 'modal-card';
      modalDiv.innerHTML = `
        <h3>⚡ LEVEL ${levelId} PROGRESS</h3>
        <div class="step-status" id="stepContainer"></div>
        <button class="cancel-chain-btn" id="cancelModalBtn">✖ CANCEL LEVEL</button>
        <p style="font-size:11px; margin-top:8px;">After each link, tap "Continue". Ads run automatically.</p>
      `;
      overlay.appendChild(modalDiv);
      document.body.appendChild(overlay);
      const container = modalDiv.querySelector('#stepContainer');
      
      function render(activeIdx = -1) {
        container.innerHTML = '';
        steps.forEach((label, idx) => {
          const div = document.createElement('div');
          div.className = 'step-item';
          div.innerText = label;
          if (stepStatuses[idx] === 'done') div.classList.add('step-done');
          else if (idx === activeIdx && stepStatuses[idx] !== 'done') div.classList.add('step-active');
          else div.classList.add('step-pending');
          container.appendChild(div);
        });
      }
      
      let cancelled = false;
      const cancelSignal = { cancelled: false };
      const updateStep = (stepIdx, state) => {
        if (cancelled) return;
        if (state === 'active') {
          stepStatuses[stepIdx] = 'pending';
          render(stepIdx);
        } else if (state === 'done') {
          stepStatuses[stepIdx] = 'done';
          render(-1);
        }
      };
      
      const cancelBtn = modalDiv.querySelector('#cancelModalBtn');
      cancelBtn.addEventListener('click', () => {
        cancelled = true;
        cancelSignal.cancelled = true;
        overlay.remove();
        if (onCancel) onCancel();
        showToast(`❌ Level ${levelId} cancelled`, "#e67e22");
      });
      
      runLevelChain(levelId, updateStep, cancelSignal)
        .then(() => {
          if (!cancelled) {
            overlay.remove();
            onComplete();
          }
        })
        .catch(err => {
          if (!cancelled && err.message !== "Cancelled" && err.message !== "Cancelled by user") {
            overlay.remove();
            showToast(`❌ Error: ${err.message}. Retry level.`, "#e74c3c");
            if (onCancel) onCancel();
          } else if (cancelled) {
            overlay.remove();
          } else {
            overlay.remove();
            if (onCancel) onCancel();
          }
        });
      
      return { cancel: () => { cancelled = true; cancelSignal.cancelled = true; overlay.remove(); } };
    }
    
    async function startLevel(levelId) {
      if (isLevelCompleted(levelId)) {
        showToast(`Level ${levelId} already completed!`, "#f5b042");
        return;
      }
      if (activeLevelObj && activeLevelObj.cancel) {
        showToast(`Another level in progress. Cancel it first.`, "#e67e22");
        return;
      }
      activeLevelObj = { cancel: null };
      const handler = showLevelModal(
        levelId,
        () => {
          markLevelComplete(levelId);
          activeLevelObj = null;
        },
        () => {
          activeLevelObj = null;
        }
      );
      activeLevelObj.cancel = () => {
        if (handler && handler.cancel) handler.cancel();
      };
    }
    
    // ---------- Render 10 Levels ----------
    function renderTasks() {
      taskListEl.innerHTML = '';
      const completedCount = tasks.filter(t => t.completed).length;
      const allCompleted = completedCount === TOTAL_LEVELS;
      progressSpan.innerText = `${completedCount} / ${TOTAL_LEVELS}`;
      
      if (allCompleted && rewardActive) {
        statusTextSpan.innerText = "🎉 ALL 10 DONE! Copy reward code 🎉";
        globalStatusDiv.classList.remove('status-notcomplete');
        globalStatusDiv.classList.add('status-complete');
      } else if (allCompleted) {
        statusTextSpan.innerText = "✨ 10/10! Activating reward ✨";
        globalStatusDiv.classList.add('status-complete');
      } else {
        statusTextSpan.innerText = `${completedCount} / 10 levels completed`;
        globalStatusDiv.classList.remove('status-complete');
        globalStatusDiv.classList.add('status-notcomplete');
      }
      
      for (let i = 1; i <= TOTAL_LEVELS; i++) {
        const completed = tasks.find(t => t.id === i)?.completed || false;
        const li = document.createElement('li');
        li.className = 'task-item';
        if (completed) li.classList.add('completed');
        li.setAttribute('data-id', i);
        const iconSpan = document.createElement('span');
        iconSpan.className = 'task-icon';
        iconSpan.innerText = completed ? "✓ DONE" : "▶ START";
        const textSpan = document.createElement('span');
        textSpan.className = 'task-text';
        textSpan.innerText = `Level ${i} – ${completed ? 'finished' : 'Link → Ad1 → Ad2 → Ad3 → Ad4 → Link'}`;
        li.appendChild(iconSpan);
        li.appendChild(textSpan);
        taskListEl.appendChild(li);
      }
    }
    
    function onTaskClick(e) {
      const li = e.target.closest('.task-item');
      if (!li) return;
      const id = parseInt(li.getAttribute('data-id'), 10);
      if (!isNaN(id)) startLevel(id);
    }
    
    async function handleCopyReset() {
      if (!rewardActive || rewardSeconds <= 0) {
        showToast("❌ No active reward code or expired. Complete all 10 levels again.", "#e74c3c");
        return;
      }
      try {
        await navigator.clipboard.writeText(currentRewardCode);
        showToast("🏆 Reward code copied! Progress resets now.", "#2ecc71");
        fullReset();
      } catch (err) {
        showToast("Copy failed, tap again", "#e67e22");
      }
    }
    
    // ---------- Date/Time ----------
    function updateDateTime() {
      const now = new Date();
      const dateStr = now.toLocaleDateString(undefined, { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });
      const timeStr = now.toLocaleTimeString('en-GB', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
      const dateEl = document.getElementById('currentDate');
      const timeEl = document.getElementById('currentTime');
      if (dateEl) dateEl.innerText = dateStr;
      if (timeEl) timeEl.innerText = timeStr;
    }
    
    // ---------- Event Binding ----------
    taskListEl.addEventListener('click', onTaskClick);
    copyBtn.addEventListener('click', handleCopyReset);
    
    // ---------- INIT ----------
    tasks = loadTasks();
    renderTasks();
    const allDone = tasks.every(t => t.completed);
    if (allDone && !rewardActive) activateReward();
    setInterval(updateDateTime, 1000);
    updateDateTime();
    showToast("✅ Ready! Tap any level to begin.", "#2ecc71");
  })();
</script>
</body>
</html>
