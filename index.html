<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Telegram Ads Test</title>

  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <script src="https://richinfo.co/richpartners/telegram/js/tg-ob.js"></script>

  <style>
    body{
      background:#121212;
      display:flex;
      justify-content:center;
      align-items:center;
      height:100vh;
      margin:0;
      font-family:Arial;
    }

    button{
      padding:16px 40px;
      font-size:22px;
      border:none;
      border-radius:12px;
      background:#00c853;
      color:#fff;
      cursor:pointer;
    }
  </style>
</head>
<body>

<button onclick="startAd()">Start</button>

<script>
  Telegram.WebApp.ready();

  const ads = new TelegramAdsController();

  ads.initialize({
    pubId: "1008310",
    appId: "7019",
  });

  async function startAd() {
    try {

      // wait little
      await new Promise(r => setTimeout(r, 1000));

      await ads.showAd();

      alert("Reward Received");

    } catch(err) {

      console.log(err);

      alert("No ads available now");

    }
  }
</script>

</body>
</html>
