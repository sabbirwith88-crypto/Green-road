<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <script src="https://richinfo.co/richpartners/telegram/js/tg-ob.js"></script>

  <style>
    body{
      background:#111;
      display:flex;
      justify-content:center;
      align-items:center;
      height:100vh;
      margin:0;
      font-family:Arial;
    }

    button{
      padding:15px 35px;
      border:none;
      border-radius:12px;
      font-size:22px;
      background:#00c853;
      color:white;
    }
  </style>
</head>
<body>

<button onclick="watchAd()">Start</button>

<script>
  Telegram.WebApp.ready();

  const ads = new TelegramAdsController();

  ads.initialize({
    pubId: "1008310",
    appId: "7019",
  });

  async function watchAd() {

    try {

      await ads.showAd();

      alert("Reward Claimed");

    } catch(err) {

      console.log(err);

      alert("No rewarded ads available");

    }

  }
</script>

</body>
</html>
